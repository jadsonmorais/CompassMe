services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: compassme
      POSTGRES_PASSWORD: compassme
      POSTGRES_DB: compassme
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compassme"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: compassme
    volumes:
      - ./backend/src/infrastructure/database/migrations:/migrations:ro
    entrypoint: >
      sh -c "
        for f in /migrations/*.sql; do
          echo \"→ Applying $$f\";
          psql -h db -U compassme -d compassme -f $$f;
        done;
        echo '✓ Migrations done'
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      DATABASE_URL: postgres://compassme:compassme@db:5432/compassme
      JWT_SECRET: local-dev-secret-change-in-production-32c
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3002:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: http://localhost:3002
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  pg_data:
